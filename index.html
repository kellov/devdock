<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevDock</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --card: #111111;
            --border: #2a2a2a;
            --text: #ffffff;
            --text-secondary: #999999;
            --accent: #ffffff;
            --radius: 12px;
            --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        .login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            flex-direction: column;
            gap: 2rem;
            padding: 1rem;
        }
        .logo { display: flex; align-items: center; gap: 0.8rem; }
        .logo svg { width: 48px; height: 48px; }
        .logo h1 { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .login-card h2 { margin-bottom: 1.8rem; font-size: 1.2rem; color: var(--text-secondary); }
        .auth-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            width: 100%;
            padding: 0.9rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--card);
            color: var(--text);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 0.8rem;
            transition: all 0.2s;
            font-family: inherit;
        }
        .auth-btn:hover { border-color: var(--text); background: #1a1a1a; }
        .auth-btn svg { width: 22px; height: 22px; }

        .app { display: flex; height: 100vh; }
        .sidebar {
            width: 260px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .sidebar .logo-small { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem; margin-bottom: 1rem; }
        .sidebar .logo-small svg { width: 32px; height: 32px; }
        .sidebar .logo-small span { font-weight: 700; font-size: 1.2rem; }
        .user-info {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.8rem; background: var(--card);
            border-radius: var(--radius-sm); border: 1px solid var(--border);
            margin-bottom: 0.5rem;
        }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); }
        .user-name { font-weight: 600; font-size: 0.85rem; }
        .user-email { font-size: 0.7rem; color: var(--text-secondary); }

        .nav-item {
            display: flex; align-items: center; gap: 0.7rem;
            padding: 0.7rem 1rem; border-radius: var(--radius-sm);
            cursor: pointer; color: var(--text-secondary);
            transition: all 0.15s; font-weight: 500; font-size: 0.9rem;
            border: none; background: none; width: 100%; text-align: left;
            font-family: inherit;
        }
        .nav-item:hover { background: var(--card); color: var(--text); }
        .nav-item.active { background: var(--card); color: var(--text); border: 1px solid var(--border); }
        .nav-item svg { width: 20px; height: 20px; }
        .nav-item.logout-btn { margin-top: auto; color: #ff4444; }

        .main { flex: 1; padding: 2rem; overflow-y: auto; background: var(--bg); }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1.5rem;
            display: flex; align-items: center; gap: 1rem;
        }
        .stat-card svg { width: 40px; height: 40px; }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-label { font-size: 0.8rem; color: var(--text-secondary); }

        .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .bot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1rem; }
        .bot-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1.5rem;
        }
        .bot-card:hover { border-color: var(--text); }
        .bot-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
        .bot-name { font-weight: 700; font-size: 1rem; }
        .status-badge {
            padding: 0.2rem 0.7rem; border-radius: 20px;
            font-size: 0.7rem; font-weight: 700;
        }
        .status-badge.online { background: #111; color: #fff; border: 1px solid #333; }
        .status-badge.offline { background: #111; color: #666; border: 1px solid #222; }
        .bot-meta { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 0.2rem; }
        .bot-stats { display: flex; gap: 1rem; margin: 0.8rem 0; font-size: 0.8rem; color: var(--text-secondary); }
        .bot-stats span { display: flex; align-items: center; gap: 0.3rem; }
        .bot-stats svg { width: 14px; height: 14px; }
        .actions { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }

        button {
            padding: 0.5rem 1.2rem; border: 1px solid var(--border);
            border-radius: var(--radius-sm); background: var(--card);
            color: var(--text); cursor: pointer; font-weight: 600;
            font-size: 0.8rem; transition: all 0.15s; font-family: inherit;
        }
        button:hover { border-color: var(--text); background: #1a1a1a; }
        button.primary { background: #fff; border-color: #fff; color: #000; }
        button.primary:hover { background: #ddd; }
        button.success { background: #fff; border-color: #fff; color: #000; }
        button.danger { background: transparent; border-color: #444; color: #ff4444; }
        button.danger:hover { background: #1a0000; border-color: #ff4444; }

        .form-group { margin-bottom: 1.2rem; }
        label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; color: var(--text-secondary); }
        input, textarea {
            width: 100%; padding: 0.7rem 1rem;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text);
            font-size: 0.9rem; font-family: inherit;
        }
        input:focus, textarea:focus { outline: none; border-color: var(--text); }
        textarea { resize: vertical; min-height: 120px; font-family: 'Fira Code', monospace; font-size: 0.8rem; }

        .logs-box {
            background: #050505; border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 1rem;
            height: 400px; overflow-y: auto;
            font-family: 'Fira Code', monospace; font-size: 0.75rem;
            color: #ccc; white-space: pre-wrap;
        }

        .toast {
            position: fixed; bottom: 24px; right: 24px;
            padding: 1rem 1.5rem; border-radius: var(--radius-sm);
            color: #000; font-weight: 600; z-index: 9999;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .toast.success { background: #fff; }
        .toast.error { background: #ff4444; color: #fff; }
        .toast.info { background: #333; color: #fff; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-screen">
        <div class="logo">
            <svg viewBox="0 0 48 48" fill="none">
                <rect width="48" height="48" rx="12" stroke="white" stroke-width="2"/>
                <path d="M16 28l6 6 12-12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <h1>DevDock</h1>
        </div>
        <div class="login-card">
            <h2>Sign in to continue</h2>
            <button class="auth-btn" onclick="signInWithGoogle()">
                <svg viewBox="0 0 24 24"><path fill="#fff" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#ccc" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#999" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#666" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Google
            </button>
            <button class="auth-btn" onclick="signInWithGitHub()">
                <svg viewBox="0 0 24 24" fill="#fff"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.73.083-.73 1.205.085 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.418-1.305.762-1.604-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12 24 5.37 18.63 0 12 0z"/></svg>
                GitHub
            </button>
        </div>
    </div>

    <div id="app" class="app hidden">
        <aside class="sidebar">
            <div class="logo-small">
                <svg viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="12" stroke="white" stroke-width="2"/><path d="M16 28l6 6 12-12" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>DevDock</span>
            </div>
            <div class="user-info" id="sidebarUserInfo"></div>
            <button class="nav-item active" data-page="dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                Dashboard
            </button>
            <button class="nav-item" data-page="bots">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="3"/></svg>
                My Bots
            </button>
            <button class="nav-item" data-page="addbot">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                New Bot
            </button>
            <button class="nav-item" data-page="logs">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                Logs
            </button>
            <button class="nav-item logout-btn" onclick="signOut()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Sign Out
            </button>
        </aside>
        <main class="main">
            <div class="page active" id="page-dashboard">
                <div class="stats-grid">
                    <div class="stat-card">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="3"/></svg>
                        <div><div class="stat-value" id="statTotalBots">0</div><div class="stat-label">Total Bots</div></div>
                    </div>
                    <div class="stat-card">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                        <div><div class="stat-value" id="statOnlineBots">0</div><div class="stat-label">Online</div></div>
                    </div>
                    <div class="stat-card">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                        <div><div class="stat-value" id="statMessages">0</div><div class="stat-label">Messages</div></div>
                    </div>
                    <div class="stat-card">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="white"/></svg>
                        <div><div class="stat-value" id="statErrors">0</div><div class="stat-label">Errors 24h</div></div>
                    </div>
                </div>
                <div class="section-title">Recent Bots</div>
                <div class="bot-grid" id="recentBots"><p style="color:#666;">Loading...</p></div>
            </div>
            <div class="page" id="page-bots">
                <div class="section-title">All Bots</div>
                <div class="bot-grid" id="allBots"><p style="color:#666;">Loading...</p></div>
            </div>
            <div class="page" id="page-addbot">
                <div class="section-title">New Telegram Bot</div>
                <form id="addBotForm" style="max-width:600px;">
                    <div class="form-group">
                        <label>Bot Name</label>
                        <input type="text" id="botName" placeholder="My Echo Bot" required>
                    </div>
                    <div class="form-group">
                        <label>Bot Token (from @BotFather)</label>
                        <input type="text" id="botToken" placeholder="1234567890:ABCdef..." required>
                    </div>
                    <div class="form-group">
                        <label>Bot Code (Python)</label>
                        <textarea id="botCode" placeholder="import asyncio&#10;from telegram import Bot&#10;&#10;async def main():&#10;    bot = Bot(token='TOKEN')&#10;    await bot.send_message(chat_id='...', text='Hello')" required></textarea>
                    </div>
                    <button type="submit" class="primary" style="width:100%;">Deploy Bot</button>
                </form>
            </div>
            <div class="page" id="page-logs">
                <div class="section-title">System Logs</div>
                <div class="logs-box" id="logBox">Loading...</div>
            </div>
        </main>
    </div>

    <div id="toastContainer"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCQlvzosVihEhlF2W-jE2DcYViqHXwT4YM",
            authDomain: "devdock-5cb61.firebaseapp.com",
            databaseURL: "https://devdock-5cb61-default-rtdb.firebaseio.com",
            projectId: "devdock-5cb61",
            storageBucket: "devdock-5cb61.firebasestorage.app",
            messagingSenderId: "866582930096",
            appId: "1:866582930096:web:6521525247be0ef271d175"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let botsCache = [];
        let unsubscribeBots = null;

        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(e => toast('Error: ' + e.message, 'error'));
        }
        function signInWithGitHub() {
            const provider = new firebase.auth.GithubAuthProvider();
            auth.signInWithPopup(provider).catch(e => toast('Error: ' + e.message, 'error'));
        }
        function signOut() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
                updateUserInfo();
                subscribeToBots();
                subscribeToLogs();
                toast('Welcome, ' + (user.displayName || user.email), 'success');
            } else {
                currentUser = null;
                document.getElementById('loginScreen').classList.remove('hidden');
                document.getElementById('app').classList.add('hidden');
                if (unsubscribeBots) unsubscribeBots();
            }
        });

        function updateUserInfo() {
            if (!currentUser) return;
            const name = currentUser.displayName || currentUser.email.split('@')[0];
            const email = currentUser.email || '';
            document.getElementById('sidebarUserInfo').innerHTML = `
                <img src="${currentUser.photoURL || ''}" class="user-avatar" onerror="this.style.display='none'">
                <div><div class="user-name">${esc(name)}</div><div class="user-email">${esc(email)}</div></div>
            `;
        }

        function subscribeToBots() {
            if (!currentUser) return;
            if (unsubscribeBots) unsubscribeBots();
            unsubscribeBots = db.collection('bots').where('userId', '==', currentUser.uid).orderBy('createdAt', 'desc')
                .onSnapshot(snap => {
                    botsCache = [];
                    snap.forEach(doc => botsCache.push({ id: doc.id, ...doc.data() }));
                    updateDashboard();
                    updateBotsPage();
                    updateStats();
                });
        }

        function subscribeToLogs() {
            if (!currentUser) return;
            db.collection('logs').where('userId', '==', currentUser.uid).orderBy('timestamp', 'desc').limit(100)
                .onSnapshot(snap => {
                    const logs = [];
                    snap.forEach(doc => {
                        const d = doc.data();
                        const t = d.timestamp ? new Date(d.timestamp.toDate()).toLocaleTimeString() : '';
                        logs.push(`[${t}] ${d.message}`);
                    });
                    const box = document.getElementById('logBox');
                    if (box) box.textContent = logs.join('\n') || 'No logs';
                });
        }

        function updateStats() {
            document.getElementById('statTotalBots').textContent = botsCache.length;
            document.getElementById('statOnlineBots').textContent = botsCache.filter(b => b.status === 'online').length;
            document.getElementById('statMessages').textContent = botsCache.reduce((s, b) => s + (b.totalMessages || 0), 0);
            document.getElementById('statErrors').textContent = botsCache.reduce((s, b) => s + (b.errors24h || 0), 0);
        }

        function updateDashboard() {
            const c = document.getElementById('recentBots');
            const recent = botsCache.slice(0, 3);
            if (!recent.length) { c.innerHTML = '<p style="color:#666;">No bots yet</p>'; return; }
            c.innerHTML = recent.map(b => botCard(b)).join('');
        }

        function updateBotsPage() {
            const c = document.getElementById('allBots');
            if (!botsCache.length) { c.innerHTML = '<p style="color:#666;">No bots yet</p>'; return; }
            c.innerHTML = botsCache.map(b => botCard(b)).join('');
        }

        function botCard(bot) {
            const on = bot.status === 'online';
            return `
            <div class="bot-card">
                <div class="bot-header">
                    <span class="bot-name">${esc(bot.name)}</span>
                    <span class="status-badge ${on ? 'online' : 'offline'}">${on ? 'ONLINE' : 'OFFLINE'}</span>
                </div>
                <div class="bot-meta">Token: ${esc((bot.token||'').substring(0,15))}...</div>
                <div class="bot-stats">
                    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> ${bot.totalMessages||0}</span>
                    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg> ${bot.totalUsers||0}</span>
                    <span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/></svg> ${bot.errors24h||0}</span>
                </div>
                <div class="actions">
                    ${on ? `<button onclick="toggleBot('${bot.id}')">Stop</button><button onclick="restartBot('${bot.id}')">Restart</button>` : `<button class="success" onclick="toggleBot('${bot.id}')">Start</button>`}
                    <button class="danger" onclick="deleteBot('${bot.id}')">Delete</button>
                </div>
            </div>`;
        }

        async function toggleBot(id) {
            const bot = botsCache.find(b => b.id === id);
            if (!bot) return;
            const newStatus = bot.status === 'online' ? 'offline' : 'online';
            await db.collection('bots').doc(id).update({ status: newStatus, lastUpdate: firebase.firestore.FieldValue.serverTimestamp() });
            addLog(id, newStatus === 'online' ? 'Bot started' : 'Bot stopped');
        }

        async function restartBot(id) {
            await db.collection('bots').doc(id).update({ status: 'offline' });
            setTimeout(async () => {
                await db.collection('bots').doc(id).update({ status: 'online', lastUpdate: firebase.firestore.FieldValue.serverTimestamp() });
            }, 500);
            addLog(id, 'Bot restarted');
        }

        async function deleteBot(id) {
            if (!confirm('Delete this bot?')) return;
            await db.collection('bots').doc(id).delete();
            toast('Bot deleted', 'info');
        }

        async function addLog(botId, message) {
            if (!currentUser) return;
            await db.collection('logs').add({
                userId: currentUser.uid,
                botId: botId,
                type: 'info',
                message: message,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
        }

        document.getElementById('addBotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (!currentUser) return toast('Please sign in', 'error');
            const name = document.getElementById('botName').value.trim();
            const token = document.getElementById('botToken').value.trim();
            const code = document.getElementById('botCode').value.trim();
            if (!name || !token || !code) return toast('Fill all fields', 'error');

            const botId = Date.now().toString(36) + Math.random().toString(36).substring(2, 6);
            await db.collection('bots').doc(botId).set({
                userId: currentUser.uid,
                email: currentUser.email,
                name: name,
                token: token,
                status: 'online',
                code: code,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                lastUpdate: firebase.firestore.FieldValue.serverTimestamp(),
                totalMessages: 0,
                totalUsers: 0,
                errors24h: 0,
                isPolling: true
            });
            this.reset();
            toast('Bot deployed!', 'success');
            addLog(botId, 'Bot created: ' + name);
            document.querySelectorAll('.nav-item[data-page]').forEach(b => b.classList.remove('active'));
            document.querySelector('[data-page="bots"]').classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-bots').classList.add('active');
        });

        document.querySelectorAll('.nav-item[data-page]').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('page-' + item.dataset.page).classList.add('active');
            });
        });

        function toast(msg, type) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = '0.3s'; setTimeout(() => t.remove(), 300); }, 3000);
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    </script>
</body>
</html>
